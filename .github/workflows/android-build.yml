name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Force Clean and Install
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm install --include=optional
          
      - name: Build Web App
        run: npm run build

      - name: Prepare Web Assets
        run: |
          # 确保 dist 文件夹存在，并复制到 www 以防万一
          mkdir -p www
          cp -r dist/* www/
          cp -r dist/* dist/ # 确保 dist 内部结构正确

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize and Add Android Platform
        # 核心修复：强制添加 Android 平台，并查看输出日志
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          # 检查 android 文件夹是否存在，如果不存在则报错
          if [ ! -d "android" ]; then
            echo "错误：android 文件夹未创建成功！"
            exit 1
          fi
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
